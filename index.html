<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Strength Checker</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center mt-5">
  <div class="card shadow p-4" style="max-width: 500px; width: 100%;">

    <h3 class="text-center mb-3 fw-bold">Password Strength Checker</h3>

    <div class="input-group mb-3">
      <input type="text" id="inputControl" class="form-control" placeholder="Enter Password">
      <button class="btn btn-primary" id="button-addon1">Check</button>
    </div>

    <div id="warning" class="text-danger fw-semibold mb-2" style="display:none;">
      Please enter a password
    </div>

    <div class="progress mb-3" style="height: 10px;">
      <div id="strengthBar" class="progress-bar"></div>
    </div>

    <h5 id="signalStrength" class="text-center fw-bold"></h5>

    <ul class="list-group mt-4">
      <li class="list-group-item active">Rules</li>
      <li class="list-group-item d-flex justify-content-between" id="rule1">
        Uppercase Letter <span class="badge bg-secondary">Pending</span>
      </li>
      <li class="list-group-item d-flex justify-content-between" id="rule2">
        Lowercase Letter <span class="badge bg-secondary">Pending</span>
      </li>
      <li class="list-group-item d-flex justify-content-between" id="rule3">
        Number <span class="badge bg-secondary">Pending</span>
      </li>
    </ul>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="main.js"></script>

</body>
</html>
